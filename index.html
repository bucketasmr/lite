<script>
const MAX_ATTEMPTS = 5;

const uiTL = {

    guide: ["<b>1. Manual:</b> Click icons to start/stop specific sounds.", "<b>2. Background:</b> Sound works even on locked screen.", "<b>3. Auto:</b> Press <b>PLAY</b> for random switching.", "<b>4. Speed:</b> Use the speed menu to change rhythm.", "<b>5. Mute:</b> Use small icons on active tiles to silence."],
    speeds: { slow: "Slow", medium: "Medium", fast: "Fast" }

  pt: { 
    code: "PT", title: "BALDE ASMR", play: "Tocar", pause: "Pausa", sleep: "Dormir", start: "INICIAR TESTE", expired: "Teste Encerrado", buy: "OBTER PREMIUM", attempts: "Usadas: ", lockDesc: "Obtenha acesso total no Patreon.", tabFeatures: "Funções", tabGuide: "Guia",
    features: ["<span>✦</span> <b>Biblioteca Total:</b> Todos os sons premium desbloqueados.", "<span>✦</span> <b>Sempre Ativo:</b> A tela não apaga durante o uso.", "<span>✦</span> <b>Mixer:</b> Toque vários sons ao mesmo tempo.", "<span>✦</span> <b>Aleatório:</b> Troca automática de sons.", "<span>✦</span> <b>Modo Sono:</b> Luz zero para relaxamento profundo."],
    guide: ["<b>1. Manual:</b> Clique nos ícones para iniciar/parar.", "<b>2. Segundo plano:</b> O som continua na tela bloqueada.", "<b>3. Auto:</b> Pressione <b>Tocar</b> para troca aleatória.", "<b>4. Velocidade:</b> Mude o ritmo no menu de velocidade.", "<b>5. Mudo:</b> Use o ícone pequeno para silenciar."],
    speeds: { slow: "Lento", medium: "Médio", fast: "Rápido" } 
  },
  uk: { 
    code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", sleep: "Сон", start: "ПОЧАТИ ТЕСТ", expired: "Час вийшов", buy: "КУПИТИ ПРЕМІУМ", attempts: "Використано: ", lockDesc: "Отримайте повний доступ на Patreon.", tabFeatures: "Функції", tabGuide: "Інструкція",
    features: ["<span>✦</span> <b>Повна Бібліотека:</b> Всі актуальні преміум звуки.", "<span>✦</span> <b>Без Сну:</b> Екран не згасає автоматично.", "<span>✦</span> <b>Міксер:</b> Грайте кілька звуків одночасно.", "<span>✦</span> <b>Рандомайзер:</b> Автоматичне перемикання звуків.", "<span>✦</span> <b>Нічний Режим:</b> Повна темрява для сну."],
    guide: ["<b>1. Ручний:</b> Натисніть на звук, щоб увімкнути/вимкнути.", "<b>2. Фон:</b> Звук працює навіть на заблокованому екрані.", "<b>3. Авто:</b> Кнопка <b>ГРАТИ</b> для випадкового режиму.", "<b>4. Швидкість:</b> Змінюйте темп авто-режиму в меню.", "<b>5. Тиша:</b> Маленька іконка на плитці вимикає звук."],
    speeds: { slow: "Повільно", medium: "Середньо", fast: "Швидко" } 
  },
  ru: { 
    code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", sleep: "Сон", start: "НАЧАТЬ ТЕСТ", expired: "Время вышло", buy: "КУПИТЬ ПРЕМИУМ", attempts: "Использовано: ", lockDesc: "Получите полный доступ на Patreon.", tabFeatures: "Функции", tabGuide: "Инструкция",
    features: ["<span>✦</span> <b>Полная библиотека:</b> Все текущие премиум звуки открыты.", "<span>✦</span> <b>Бодрость:</b> Экран не гаснет во время сеанса.", "<span>✦</span> <b>Микшер:</b> Запуск нескольких звуков одновременно.", "<span>✦</span> <b>Рандомайзер:</b> Авто-переключение звуков для вас.", "<span>✦</span> <b>Режим Сна:</b> Минимум света для глубокого отдыха."],
    guide: ["<b>1. Ручной:</b> Нажми на иконку для старта или стопа звука.", "<b>2. Фон:</b> Звук работает даже на заблокированном экране.", "<b>3. Авто:</b> Кнопка <b>ИГРАТЬ</b> включит случайный режим.", "<b>4. Скорость:</b> Настрой ритм переключения в меню.", "<b>5. Тишина:</b> Маленький значок на плитке убирает звук."],
    speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" } 
  }
};

const sounds = [
  { "file": "purplebrush.mp3", "name": { "en": "Purple Brush", "pt": "Pincel Roxo", "ru": "Фиолетовая кисть", "uk": "Фіолетовий пензель" }, "color": "#9664ff" },
  { "file": "greybrush.mp3", "name": { "en": "Grey Brush", "pt": "Pincel Cinза", "ru": "Серая кисть", "uk": "Сірий пензель" }, "color": "#8c8c8c" },
  { "file": "pinksoftbrush.mp3", "name": { "en": "Soft Brush", "pt": "Pincel Macio", "ru": "Мягкая кисть", "uk": "М’який пензель" }, "color": "#ffb6c1" },
  { "file": "strawberry.mp3", "name": { "en": "Strawberry", "pt": "Morango", "ru": "Клубника", "uk": "Полуниця" }, "color": "#ff69b4" },
  { "file": "wax.mp3", "name": { "en": "Wax", "pt": "Cera", "ru": "Воск", "uk": "Віск" }, "color": "#ffa500" },
  { "file": "carrot.mp3", "name": { "en": "Carrot", "pt": "Cenoura", "ru": "Морковь", "uk": "Морква" }, "color": "#ff8c00" },
  { "file": "choko.mp3", "name": { "en": "Choco", "pt": "Chocolate", "ru": "Шоколад", "uk": "Шоколад" }, "color": "#8b4513" },
  { "file": "wood.mp3", "name": { "en": "Wood", "pt": "Madeira", "ru": "Дерево", "uk": "Дерево" }, "color": "#ffff00" },
  { "file": "oldphone.mp3", "name": { "en": "Phone", "pt": "Telefone", "ru": "Телефон", "uk": "Телефон" }, "color": "#323232" }
];

let audioElements = [], timeLeft = 120, timerActive = false, randomActive = false, speed = 22, langIdx = 0;
let trialEndTime = null;
const langOrder = ['en', 'pt', 'uk', 'ru'];
let attempts = parseInt(localStorage.getItem('trial_attempts')) || 0;

function checkAttempts() {
    if(localStorage.getItem('trial_blocked')) { lockApp(); return; }
    attempts++;
    localStorage.setItem('trial_attempts', attempts);
    if (attempts > MAX_ATTEMPTS) { lockApp(); } 
    else if (attempts > 1) { document.getElementById('attemptIndicator').style.display = 'block'; }
}

function startTrial() {
    document.getElementById('pass-screen').classList.add('hidden');
    if (!timerActive) {
        timerActive = true;
        // Запоминаем точное ВРЕМЯ СМЕРТИ (текущее время + остаток секунд)
        trialEndTime = Date.now() + (timeLeft * 1000);

        const interval = setInterval(() => {
            const now = Date.now();
            const remaining = Math.round((trialEndTime - now) / 1000);
            
            if (remaining <= 0) {
                timeLeft = 0;
                document.getElementById('timerBtn').innerText = `0:00`;
                clearInterval(interval);
                lockApp();
            } else {
                timeLeft = remaining;
                const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('timerBtn').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }, 1000);
    }
}

// Защита от сворачивания: проверяем время сразу при возврате во вкладку
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && timerActive) {
        if (Date.now() >= trialEndTime) {
            lockApp();
        }
    }
});

function lockApp() {
    timerActive = false;
    randomActive = false;
    // Принудительная моментальная остановка всех звуков
    audioElements.forEach(el => {
        el.active = false;
        el.audio.pause();
        el.audio.volume = 0;
        el.btn.classList.remove('active');
        el.btn.style.backgroundColor = "";
    });
    localStorage.setItem('trial_blocked', 'true');
    updateUI(); 
    document.getElementById('trial-expired-screen').style.display = 'flex';
    document.getElementById('pass-screen').style.display = 'none';
}

function showHelp() { document.getElementById('welcomeModal').style.display = 'flex'; }
function closeHelp() { document.getElementById('welcomeModal').style.display = 'none'; }
function switchTab(event, tabId) {
    document.querySelectorAll('.help-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

const grid = document.getElementById('soundGrid');
sounds.forEach((s, idx) => {
    const btn = document.createElement('button');
    btn.className = 'sound-button';
    btn.innerHTML = `<div class="mute-btn">🔊</div><span>${s.name['en']}</span>`;
    grid.appendChild(btn);
    const audio = new Audio(`https://raw.githubusercontent.com/bucketasmr/sounds/main/${s.file}`);
    audio.loop = true; audio.setAttribute('playsinline', '');
    const state = { audio, btn, active: false, color: s.color, isMuted: false };
    btn.onclick = () => state.active ? fadeOut(state) : fadeIn(state);
    btn.querySelector('.mute-btn').onclick = (e) => {
        e.stopPropagation();
        state.isMuted = !state.isMuted;
        btn.querySelector('.mute-btn').classList.toggle('is-muted', state.isMuted);
        state.audio.volume = state.isMuted ? 0 : (state.active ? 0.6 : 0);
    };
    audioElements.push(state);
});

function fadeIn(el) {
    if (localStorage.getItem('trial_blocked')) return;
    el.active = true; el.btn.classList.add('active'); el.btn.style.backgroundColor = el.color + "44";
    el.audio.play().catch(()=>{});
    if(!el.isMuted) {
        let v = 0; const fade = setInterval(() => {
            if (v < 0.6) { v += 0.05; el.audio.volume = v; } else clearInterval(fade);
        }, 50);
    }
}

function fadeOut(el) {
    el.active = false; el.btn.classList.remove('active'); el.btn.style.backgroundColor = "";
    let v = el.audio.volume; const fade = setInterval(() => {
        if (v > 0.05) { v -= 0.05; el.audio.volume = v; } 
        else { el.audio.pause(); el.audio.volume = 0; clearInterval(fade); }
    }, 50);
}

function updateUI() {
    const t = uiTL[langOrder[langIdx]];
    document.getElementById('title').innerText = t.title;
    document.getElementById('langBtn').innerText = t.code;
    document.getElementById('modalLangBtn').innerText = t.code;
    document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
    document.getElementById('sleepBtn').innerText = `${t.sleep}: ${document.getElementById('soundGrid').classList.contains('hidden') ? 'ON' : 'OFF'}`;
    document.getElementById('attemptIndicator').innerText = `${t.attempts} ${attempts} / ${MAX_ATTEMPTS}`;
    document.getElementById('expired-title').innerText = t.expired;
    document.getElementById('expired-desc').innerText = t.lockDesc;
    document.getElementById('premium-link').innerText = t.buy;
    document.getElementById('tabTitleFeatures').innerText = t.tabFeatures;
    document.getElementById('tabTitleGuide').innerText = t.tabGuide;
    document.getElementById('featuresList').innerHTML = t.features.map(i => `<li>${i}</li>`).join('');
    document.getElementById('guideList').innerHTML = t.guide.map(i => `<li>${i}</li>`).join('');
    audioElements.forEach((el, i) => el.btn.querySelector('span').innerText = sounds[i].name[langOrder[langIdx]]);
    
    document.getElementById('spFast').innerText = t.speeds.fast;
    document.getElementById('spMed').innerText = t.speeds.medium;
    document.getElementById('spSlow').innerText = t.speeds.slow;
    let sk = (speed === 22) ? 'fast' : (speed === 52) ? 'slow' : 'medium';
    document.getElementById('speedTrigger').innerText = t.speeds[sk];
}

function toggleRandom() {
    if (localStorage.getItem('trial_blocked')) return;
    randomActive = !randomActive; updateUI();
    if(randomActive) runRandom(); else audioElements.forEach(el => fadeOut(el));
}

function runRandom() {
    if(!randomActive || localStorage.getItem('trial_blocked') || timeLeft <= 0) return;
    let pool = audioElements.filter(el => !el.isMuted);
    const toPlay = pool.sort(() => 0.5 - Math.random()).slice(0, Math.floor(Math.random()*2)+1);
    audioElements.forEach(el => toPlay.includes(el) ? (!el.active && fadeIn(el)) : (el.active && fadeOut(el)));
    setTimeout(runRandom, speed * 1000);
}

function toggleSleep() {
    const isSleep = !document.getElementById('soundGrid').classList.contains('hidden');
    document.body.style.background = isSleep ? "black" : "";
    document.getElementById('soundGrid').classList.toggle('hidden');
    document.getElementById('sleepBtn').classList.toggle('active');
    updateUI();
}

function toggleDropdown() { document.getElementById('speedDropdown').classList.toggle('open'); }
function setSpeed(v, key) { speed = v; toggleDropdown(); updateUI(); }

document.getElementById('langBtn').onclick = document.getElementById('modalLangBtn').onclick = () => {
    langIdx = (langIdx + 1) % 4; updateUI();
};

let secretCounter = 0;
function handleSecretClick() {
    if(++secretCounter >= 5) {
        if(prompt("Code:") === "again") { localStorage.clear(); location.reload(); }
        secretCounter = 0;
    }
}

const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = resize; resize();
const starsArr = Array.from({length: 70}, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5, a: Math.random(), s: Math.random() * 0.01 }));
function draw() {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    starsArr.forEach(s => {
      s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
checkAttempts(); 
updateUI();
</script>
