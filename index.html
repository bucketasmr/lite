<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR Premium Trial</title>
<style>
  /* ЭКРАН ОКОНЧАНИЯ ТРИАЛА */
  #trial-expired-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
    z-index: 200000; display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px; backdrop-filter: blur(15px);
  }

  /* СТАРТОВЫЙ ЭКРАН */
  #pass-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
    z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s;
  }
  #pass-screen.hidden { opacity: 0; visibility: hidden; }
  
  .lock-box {
    background: rgba(255, 255, 255, 0.05); border: 1px solid #ffb400;
    padding: 40px 30px; border-radius: 30px; backdrop-filter: blur(20px);
    text-align: center; box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); width: 280px;
    position: relative;
  }

  /* ИНДИКАТОР ПОПЫТОК */
  .attempt-badge {
    position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
    background: #ff3030; color: white; padding: 4px 15px; border-radius: 20px;
    font-size: 11px; font-weight: bold; border: 1px solid #ff8080;
    white-space: nowrap; box-shadow: 0 5px 15px rgba(255, 48, 48, 0.4);
    display: none; z-index: 100;
  }

  .lock-box h2 { color: #ffb400; margin-bottom: 10px; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
  .pass-btn { background: #ffb400; color: black; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; text-decoration: none; display: block; box-sizing: border-box; }

  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505; transition: background 1s ease;
    font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg { background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%); }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  
  .title-bar { display:flex; align-items:center; gap:12px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:22px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  .live-counter {
    background: rgba(255, 50, 50, 0.15); border: 1px solid rgba(255, 50, 50, 0.4);
    padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; color: #ff8080;
    display: flex; align-items: center; gap: 5px; text-transform: uppercase;
  }
  .live-dot { width: 6px; height: 6px; background: #ff3030; border-radius: 50%; animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .lang-btn-ui { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.4); padding: 6px 12px; border-radius: 10px; color: white; cursor: pointer; font-weight: bold; font-size: 12px; }

  .controls { margin-bottom:15px; display:flex; gap:10px; flex-wrap: wrap; justify-content: center; align-items: center; z-index: 10; }
  .controls > button { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.15); color:white; cursor:pointer; font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; transition: 0.3s; }
  
  #randomBtn { background: rgba(138, 43, 226, 0.4); border: 1px solid rgba(138, 43, 226, 0.3); min-width: 80px; }
  #sleepBtn.active { background: #ffb400; border: 1px solid #ffb400; color: black; }
  #timerBtn { background: rgba(255, 255, 255, 0.05); color: #ffb400; border: 1px solid rgba(255, 180, 0, 0.3); }

  .sound-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
    gap: 15px; width: 100%; max-width: 600px; padding: 10px; 
    overflow-y: auto; flex-grow: 1; z-index: 5;
  }
  .sound-grid.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

  .sound-button { 
    aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; 
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); 
    font-weight: bold; cursor: pointer; display: flex; flex-direction: column; 
    justify-content: center; align-items: center; backdrop-filter: blur(8px); 
    transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-size: 11px; text-align: center; 
    position: relative; overflow: hidden; padding: 5px;
  }
  .sound-button.active { color: white; transform: scale(1.03); border: 1px solid rgba(255,255,255,0.4); box-shadow: 0 0 20px rgba(255,180,0,0.2); }
  
  .mute-btn { position: absolute; top: 5px; right: 5px; width: 22px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 10px; border: 1px solid rgba(255,255,255,0.2); z-index: 15; }
  .active .mute-btn { display: flex; }
  .mute-btn.is-muted { background: #ff5050; border-color: #ff8080; color: white; }

  .select-trigger { padding: 8px 14px; border-radius: 12px; background: rgba(255, 255, 255, 0.15); color: white; cursor: pointer; font-weight: bold; font-size: 13px; min-width: 90px; text-align: center; }
  .custom-select-container { position: relative; }
  .custom-dropdown { display: none; position: absolute; top: 40px; left: 50%; transform: translateX(-50%); background: #1e1e2d; border-radius: 15px; flex-direction: column; z-index: 3000; overflow: hidden; min-width: 120px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
  .custom-dropdown.open { display: flex; }
  .custom-dropdown button { padding: 12px; border: none; background: transparent; color: white; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); font-weight: bold; }

  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
</style>
</head>
<body class="fancy-bg">

<div id="trial-expired-screen">
  <div class="lock-box">
    <h2 id="expired-title" onclick="handleSecretClick()">Trial Ended</h2>
    <p id="expired-desc" style="font-size: 14px; margin-bottom: 20px;">Your 5 test attempts are over. Get full access on Patreon.</p>
    <a href="https://www.patreon.com/posts/join-to-unlock-154613006" class="pass-btn" id="premium-link">GET PREMIUM</a>
  </div>
</div>

<div id="pass-screen">
  <div class="lock-box">
    <div id="attemptIndicator" class="attempt-badge"></div>
    <h2 id="start-title">BUCKET Premium</h2>
    <p id="start-desc" style="font-size: 13px; color: #aaa; margin-bottom: 20px;">Free Trial: 2 minutes</p>
    <button class="pass-btn" id="start-btn" onclick="startTrial()">START TRIAL</button>
  </div>
</div>

<canvas id="stars"></canvas>

<div class="container">
  <div class="title-bar">
    <h1 id="title">BUCKET ASMR</h1>
    <div class="live-counter">
      <div class="live-dot"></div>
      <span id="online-count">124</span> LIVE
    </div>
    <button id="langBtn" class="lang-btn-ui">EN</button>
  </div>

  <div class="controls">
    <button id="randomBtn" onclick="toggleRandom()">Play</button>
    <button id="timerBtn">02:00</button>
    <button id="sleepBtn" onclick="toggleSleep()">Sleep: OFF</button>
    <div class="custom-select-container">
        <div class="select-trigger" onclick="toggleDropdown()" id="speedTrigger">Fast</div>
        <div class="custom-dropdown" id="speedDropdown">
            <button onclick="setSpeed(22, 'fast')" id="spFast">Fast</button>
            <button onclick="setSpeed(34, 'medium')" id="spMed">Medium</button>
            <button onclick="setSpeed(52, 'slow')" id="spSlow">Slow</button>
        </div>
    </div>
  </div>
  
  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
// --- КОНФИГУРАЦИЯ ТРИАЛА ---
const MAX_ATTEMPTS = 5;

// --- ПЕРЕВОДЫ ---
const uiTL = {
  en: { code: "EN", title: "BUCKET ASMR", play: "Play", pause: "Pause", sleep: "Sleep", start: "START TRIAL", expired: "Trial Ended", buy: "GET PREMIUM", attempts: "Used: ", speeds: { slow: "Slow", medium: "Medium", fast: "Fast" } },
  pt: { code: "PT", title: "BALDE ASMR", play: "Tocar", pause: "Pausa", sleep: "Dormir", start: "INICIAR TESTE", expired: "Teste Encerrado", buy: "OBTER PREMIUM", attempts: "Usadas: ", speeds: { slow: "Lento", medium: "Médio", fast: "Rápido" } },
  uk: { code: "UK", title: "ВІДРО АСМР", play: "Грати", pause: "Пауза", sleep: "Сон", start: "ПОЧАТИ ТЕСТ", expired: "Час вийшов", buy: "КУПИТИ ПРЕМІУМ", attempts: "Використано: ", speeds: { slow: "Повільно", medium: "Середньо", fast: "Швидко" } },
  ru: { code: "RU", title: "ВЕДРО АСМР", play: "Играть", pause: "Пауза", sleep: "Сон", start: "НАЧАТЬ ТЕСТ", expired: "Время вышло", buy: "КУПИТЬ ПРЕМИУМ", attempts: "Использовано: ", speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" } }
};

const sounds = [
  { "file": "purplebrush.mp3", "name": { "en": "Purple Brush", "pt": "Pincel Roxo", "ru": "Фиолетовая кисть", "uk": "Фіолетовий пензель" }, "color": "#9664ff" },
  { "file": "greybrush.mp3", "name": { "en": "Grey Brush", "pt": "Pincel Cinза", "ru": "Серая кисть", "uk": "Сірий пензель" }, "color": "#8c8c8c" },
  { "file": "pinksoftbrush.mp3", "name": { "en": "Soft Brush", "pt": "Pincel Macio", "ru": "Мягкая кисть", "uk": "М’який пензель" }, "color": "#ffb6c1" },
  { "file": "strawberry.mp3", "name": { "en": "Strawberry", "pt": "Morango", "ru": "Клубника", "uk": "Полуниця" }, "color": "#ff69b4" },
  { "file": "wax.mp3", "name": { "en": "Wax", "pt": "Cera", "ru": "Воск", "uk": "Віск" }, "color": "#ffa500" },
  { "file": "carrot.mp3", "name": { "en": "Carrot", "pt": "Cenoura", "ru": "Морковь", "uk": "Морква" }, "color": "#ff8c00" },
  { "file": "choko.mp3", "name": { "en": "Choco", "pt": "Chocolate", "ru": "Шоколад", "uk": "Шоколад" }, "color": "#8b4513" },
  { "file": "wood.mp3", "name": { "en": "Wood", "pt": "Madeira", "ru": "Дерево", "uk": "Дерево" }, "color": "#ffff00" },
  { "file": "oldphone.mp3", "name": { "en": "Phone", "pt": "Telefone", "ru": "Телефон", "uk": "Телефон" }, "color": "#323232" }
];

let audioElements = [], timeLeft = 120, timerActive = false, randomActive = false, speed = 22, langIdx = 0;
let secretCounter = 0;
const langOrder = ['en', 'pt', 'uk', 'ru'];

// --- ЛОГИКА ЗАЩИТЫ ---
let attempts = parseInt(localStorage.getItem('trial_attempts')) || 0;

function checkAttempts() {
    if(localStorage.getItem('trial_blocked')) {
        lockApp();
        return;
    }

    attempts++;
    localStorage.setItem('trial_attempts', attempts);

    if (attempts > MAX_ATTEMPTS) {
        lockApp();
    } else if (attempts > 1) {
        const badge = document.getElementById('attemptIndicator');
        badge.style.display = 'block';
        updateUI(); 
    }
}

function startTrial() {
    document.getElementById('pass-screen').classList.add('hidden');
    if (!timerActive) {
        timerActive = true;
        const interval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if (timeLeft <= 0) {
                clearInterval(interval);
                lockApp();
            }
        }, 1000);
    }
}

function updateTimerUI() {
    const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
    document.getElementById('timerBtn').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
}

function lockApp() {
    audioElements.forEach(el => { fadeOut(el); });
    localStorage.setItem('trial_blocked', 'true');
    document.getElementById('trial-expired-screen').style.display = 'flex';
    document.getElementById('pass-screen').style.display = 'none';
}

// РЕНДЕР СЕТКИ
const grid = document.getElementById('soundGrid');
sounds.forEach((s, idx) => {
    const btn = document.createElement('button');
    btn.className = 'sound-button';
    btn.innerHTML = `<div class="mute-btn">🔊</div><span>${s.name['en']}</span>`;
    grid.appendChild(btn);

    const audio = new Audio(`https://raw.githubusercontent.com/bucketasmr/sounds/main/${s.file}`);
    audio.loop = true; audio.setAttribute('playsinline', '');
    const state = { audio, btn, active: false, color: s.color, isMuted: false, idx };

    btn.onclick = () => { state.active ? fadeOut(state) : fadeIn(state); };
    
    const mBtn = btn.querySelector('.mute-btn');
    mBtn.onclick = (e) => {
        e.stopPropagation();
        state.isMuted = !state.isMuted;
        mBtn.classList.toggle('is-muted', state.isMuted);
        if(state.isMuted) {
            state.audio.volume = 0;
        } else if(state.active) {
            state.audio.volume = 0.6;
        }
    };

    audioElements.push(state);
});

function fadeIn(el) {
    if (el.isMuted) { el.audio.volume = 0; }
    el.active = true; el.btn.classList.add('active'); el.btn.style.backgroundColor = el.color + "44";
    el.audio.play().catch(()=>{});
    if(!el.isMuted) {
        let v = 0; const fade = setInterval(() => {
            if (v < 0.6) { v += 0.05; el.audio.volume = v; } else clearInterval(fade);
        }, 50);
    }
}

function fadeOut(el) {
    el.active = false; el.btn.classList.remove('active'); el.btn.style.backgroundColor = "";
    let v = el.audio.volume; const fade = setInterval(() => {
        if (v > 0.05) { v -= 0.05; el.audio.volume = v; } 
        else { el.audio.pause(); el.audio.volume = 0; clearInterval(fade); }
    }, 50);
}

function updateUI() {
    const t = uiTL[langOrder[langIdx]];
    document.getElementById('title').innerText = t.title;
    document.getElementById('langBtn').innerText = t.code;
    document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
    document.getElementById('sleepBtn').innerText = `${t.sleep}: ${document.getElementById('soundGrid').classList.contains('hidden') ? 'ON' : 'OFF'}`;
    
    // Индикатор попыток
    document.getElementById('attemptIndicator').innerText = `${t.attempts} ${attempts} / ${MAX_ATTEMPTS}`;

    // Перевод имен звуков
    audioElements.forEach((el, i) => {
        el.btn.querySelector('span').innerText = sounds[i].name[langOrder[langIdx]];
    });

    // Скорости
    let sk = (speed === 22) ? 'fast' : (speed === 52) ? 'slow' : 'medium';
    document.getElementById('speedTrigger').innerText = t.speeds[sk];
    document.getElementById('spFast').innerText = t.speeds.fast;
    document.getElementById('spMed').innerText = t.speeds.medium;
    document.getElementById('spSlow').innerText = t.speeds.slow;

    // Экраны
    document.getElementById('start-title').innerText = t.title;
    document.getElementById('start-btn').innerText = t.start;
    document.getElementById('expired-title').innerText = t.expired;
    document.getElementById('premium-link').innerText = t.buy;
}

function toggleRandom() {
    randomActive = !randomActive;
    updateUI();
    if(randomActive) {
        runRandom();
    } else {
        audioElements.forEach(el => fadeOut(el));
    }
}

function runRandom() {
    if(!randomActive || timeLeft <= 0) return;
    let availablePool = audioElements.filter(el => !el.isMuted);
    if(availablePool.length === 0) availablePool = [audioElements[0]];

    const count = Math.floor(Math.random() * 2) + 1;
    const toPlay = availablePool.sort(() => 0.5 - Math.random()).slice(0, count);
    
    audioElements.forEach(el => {
        if(toPlay.includes(el)) { if(!el.active) fadeIn(el); } 
        else { if(el.active) fadeOut(el); }
    });
    setTimeout(runRandom, speed * 1000);
}

function toggleSleep() {
    const isSleep = !document.getElementById('soundGrid').classList.contains('hidden');
    document.body.style.background = isSleep ? "black" : "";
    document.getElementById('soundGrid').classList.toggle('hidden');
    document.getElementById('sleepBtn').classList.toggle('active');
    updateUI();
}

function toggleDropdown() { document.getElementById('speedDropdown').classList.toggle('open'); }
function setSpeed(v, key) { 
    speed = v; 
    toggleDropdown(); 
    updateUI(); 
}

document.getElementById('langBtn').onclick = () => {
    langIdx = (langIdx + 1) % 4;
    updateUI();
};

function handleSecretClick() {
    secretCounter++;
    if(secretCounter >= 5) {
        const pass = prompt("Code:");
        if(pass === "again") { 
            localStorage.removeItem('trial_blocked'); 
            localStorage.removeItem('trial_attempts');
            location.reload(); 
        }
        secretCounter = 0;
    }
}

// ЗВЕЗДЫ
const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = resize; resize();
const starsArr = Array.from({length: 70}, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5, a: Math.random(), s: Math.random() * 0.01 }));
function draw() {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    starsArr.forEach(s => {
      s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
checkAttempts(); 
updateUI();
</script>
</body>
</html>
