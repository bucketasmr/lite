    guide: ["<b>1. Звуки:</b> Тисни на плитку для запуску.", "<b>2. Тиша:</b> Мала іконка вимикає звук треку.", "<b>3. Авто:</b> Кнопка ГРАТИ для рандомайзера.", "<b>4. Час:</b> Сесія триває 120 секунд.", "<b>5. Преміум:</b> Безліміт доступний на Patreon."],

    tabFeatures: "Функции", tabGuide: "Инструкция",
    features: ["<span>✦</span> <b>Тест:</b> 2 минуты полного доступа.", "<span>✦</span> <b>Микшер:</b> Много звуков одновременно.", "<span>✦</span> <b>Ритм:</b> 3 скорости авто-режима.", "<span>✦</span> <b>Визуал:</b> Живое звездное небо.", "<span>✦</span> <b>Сон:</b> Темный режим для отдыха."],
    guide: ["<b>1. Звуки:</b> Жми на плитку для запуска.", "<b>2. Тишина:</b> Малый значок убирает звук.", "<b>3. Авто:</b> Кнопка ИГРАТЬ для рандома.", "<b>4. Время:</b> Сессия длится 120 секунд.", "<b>5. Премиум:</b> Безлимит ждет на Patreon."],
    speeds: { slow: "Медленно", medium: "Средне", fast: "Быстро" } 
  }
};

const soundsData = [
  { "file": "purplebrush.mp3", "name": { "en": "Purple Brush", "pt": "Pincel Roxo", "ru": "Фиолетовая кисть", "uk": "Фіолетовий пензель" }, "color": "#9664ff" },
  { "file": "greybrush.mp3", "name": { "en": "Grey Brush", "pt": "Pincel Cinза", "ru": "Серая кисть", "uk": "Сірий пензель" }, "color": "#8c8c8c" },
  { "file": "pinksoftbrush.mp3", "name": { "en": "Soft Brush", "pt": "Pincel Macio", "ru": "Мягкая кисть", "uk": "М’який пензель" }, "color": "#ffb6c1" },
  { "file": "strawberry.mp3", "name": { "en": "Strawberry", "pt": "Morango", "ru": "Клубника", "uk": "Полуниця" }, "color": "#ff69b4" },
  { "file": "wax.mp3", "name": { "en": "Wax", "pt": "Cera", "ru": "Воск", "uk": "Віск" }, "color": "#ffa500" },
  { "file": "carrot.mp3", "name": { "en": "Carrot", "pt": "Cenoura", "ru": "Морковь", "uk": "Морква" }, "color": "#ff8c00" },
  { "file": "choko.mp3", "name": { "en": "Choco", "pt": "Chocolate", "ru": "Шоколад", "uk": "Шоколад" }, "color": "#8b4513" },
  { "file": "wood.mp3", "name": { "en": "Wood", "pt": "Madeira", "ru": "Дерево", "uk": "Дерево" }, "color": "#ffff00" },
  { "file": "oldphone.mp3", "name": { "en": "Phone", "pt": "Telefone", "ru": "Телефон", "uk": "Телефон" }, "color": "#323232" }
];

let audioElements = [], timeLeft = 120, timerActive = false, randomActive = false, speed = 8, langIdx = 0;
let trialEndTime = null, randomTimer = null, globalInterval = null, cleanupInterval = null;
let _sc = 0, _st;
const langOrder = ['en', 'pt', 'uk', 'ru'];
let attempts = parseInt(localStorage.getItem('trial_attempts')) || 0;

function _checkKey(v) { return btoa(v) === "YWdhaW4="; }
function handleSecretClick(e) {
    if(e) e.preventDefault();
    _sc++; clearTimeout(_st);
    if (_sc >= 3) {
        const input = prompt("Key:");
        if (input && _checkKey(input)) { localStorage.clear(); location.reload(); }
        _sc = 0;
    }
    _st = setTimeout(() => { _sc = 0; }, 2000);
}

document.getElementById('expired-title').addEventListener('pointerdown', handleSecretClick);
document.getElementById('start-title').addEventListener('pointerdown', handleSecretClick);

function checkAttempts() {
    if(localStorage.getItem('trial_blocked') || attempts >= MAX_ATTEMPTS) { lockApp(); return; }
    if (attempts > 0) { document.getElementById('attemptIndicator').style.display = 'block'; }
}

function initSounds() {
    const grid = document.getElementById('soundGrid');
    grid.innerHTML = ''; audioElements = [];
    soundsData.forEach((s) => {
        const btn = document.createElement('button');
        btn.className = 'sound-button';
        btn.innerHTML = `
            <div class="status-dot"></div>
            <div class="mute-btn">🔊</div>
            <span>${s.name[langOrder[langIdx]]}</span>
        `;
        grid.appendChild(btn);
        
        const dot = btn.querySelector('.status-dot');
        const audio = new Audio(`https://raw.githubusercontent.com/bucketasmr/sounds/main/${s.file}`);
        
        audio.loop = true; 
        audio.setAttribute('playsinline', '');
        audio.preload = "auto";

        audio.addEventListener('canplaythrough', () => { dot.classList.add('ready'); });
        audio.addEventListener('waiting', () => { dot.classList.remove('ready'); });
        audio.addEventListener('error', () => { dot.classList.remove('ready'); });

        const state = { audio, btn, active: false, color: s.color, isMuted: false, fadeInt: null };
        
        btn.onclick = () => { if(timerActive) state.active ? fadeOut(state) : fadeIn(state); };
        
        btn.querySelector('.mute-btn').onclick = (e) => {
            e.stopPropagation();
            state.isMuted = !state.isMuted;
            btn.querySelector('.mute-btn').classList.toggle('is-muted', state.isMuted);
            state.audio.volume = state.isMuted ? 0 : (state.active ? 0.6 : 0);
        };
        audioElements.push(state);
    });
}

function unlockAllAudio() {
    audioElements.forEach(el => {
        el.audio.play().then(() => {
            if (!el.active) {
                el.audio.pause();
                el.audio.volume = 0;
            }
        }).catch(e => console.log("Unlock suppressed"));
    });
}

function stopAllSoundsImmediately() {
    audioElements.forEach(el => { 
        el.active = false; 
        if (el.fadeInt) clearInterval(el.fadeInt);
        el.audio.pause(); 
        el.audio.currentTime = 0; 
        el.audio.volume = 0; 
        if(el.btn) {
            el.btn.classList.remove('active'); 
            el.btn.style.backgroundColor = ""; 
        }
    });
}

function showHelp() { document.getElementById('welcomeModal').style.display = 'flex'; }
function closeHelp() { document.getElementById('welcomeModal').style.display = 'none'; }
function switchTab(event, tabId) {
    document.querySelectorAll('.help-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
}

function startTrial() {
    if(timerActive || attempts >= MAX_ATTEMPTS) return;
    if(cleanupInterval) { clearInterval(cleanupInterval); cleanupInterval = null; }
    unlockAllAudio();
    attempts++;
    localStorage.setItem('trial_attempts', attempts);
    document.getElementById('pass-screen').classList.add('hidden');
    showHelp();
    timerActive = true;
    timeLeft = 120;
    trialEndTime = Date.now() + (timeLeft * 1000);
    if(globalInterval) clearInterval(globalInterval);
    globalInterval = setInterval(() => {
        const now = Date.now();
        const remaining = Math.round((trialEndTime - now) / 1000);
        if (remaining <= 0) { lockApp(); } else {
            timeLeft = remaining;
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timerBtn').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);
    updateUI();
}

function retryTrial() {
    if(attempts >= MAX_ATTEMPTS) return;
    location.reload();
}

function lockApp() {
    timerActive = false; randomActive = false;
    clearTimeout(randomTimer);
    if(globalInterval) clearInterval(globalInterval);
    
    stopAllSoundsImmediately();
    if(cleanupInterval) clearInterval(cleanupInterval);
    cleanupInterval = setInterval(stopAllSoundsImmediately, 2000);

    if(attempts >= MAX_ATTEMPTS) {
        localStorage.setItem('trial_blocked', 'true');
        document.getElementById('retry-btn').style.display = 'none';
    } else {
        document.getElementById('retry-btn').style.display = 'block';
    }
    document.getElementById('trial-expired-screen').style.display = 'flex';
    updateUI();
}

function fadeIn(el) {
    if (!timerActive) return; 
    clearInterval(el.fadeInt);
    el.active = true; 
    el.btn.classList.add('active'); 
    el.btn.style.backgroundColor = el.color + "44";
    el.audio.play().catch(()=>{});
    
    if(!el.isMuted) {
        let v = el.audio.volume;
        el.fadeInt = setInterval(() => {
            if (v < 0.6) { v += 0.05; el.audio.volume = Math.min(v, 0.6); } 
            else { el.audio.volume = 0.6; clearInterval(el.fadeInt); }
        }, 50);
    }
}

function fadeOut(el) {
    clearInterval(el.fadeInt);
    el.active = false; 
    el.btn.classList.remove('active'); 
    el.btn.style.backgroundColor = "";
    let v = el.audio.volume; 
    el.fadeInt = setInterval(() => {
        if (v > 0.05) { v -= 0.05; el.audio.volume = Math.max(v, 0); } 
        else { el.audio.pause(); el.audio.volume = 0; clearInterval(el.fadeInt); }
    }, 50);
}

function updateUI() {
    const t = uiTL[langOrder[langIdx]];
    document.getElementById('title').innerText = t.title;
    document.getElementById('langBtn').innerText = t.code;
    document.getElementById('randomBtn').innerText = randomActive ? t.pause : t.play;
    document.getElementById('sleepBtn').innerText = `${t.sleep}: ${document.getElementById('soundGrid').classList.contains('hidden') ? 'ON' : 'OFF'}`;
    document.getElementById('attemptIndicator').innerText = `${t.attempts} ${attempts} / ${MAX_ATTEMPTS}`;
    document.getElementById('expired-title').innerText = t.expired;
    document.getElementById('retry-btn').innerText = `${t.retry} (${attempts}/${MAX_ATTEMPTS})`;
    document.getElementById('premium-link').innerText = t.buy;
    document.getElementById('expired-desc').innerText = (attempts >= MAX_ATTEMPTS) ? t.lockDesc : "";
    document.getElementById('tabTitleFeatures').innerText = t.tabFeatures;
    document.getElementById('tabTitleGuide').innerText = t.tabGuide;
    document.getElementById('featuresList').innerHTML = t.features.map(i => `<li>${i}</li>`).join('');
    document.getElementById('guideList').innerHTML = t.guide.map(i => `<li>${i}</li>`).join('');
    audioElements.forEach((el, i) => { 
        const span = el.btn.querySelector('span');
        if(span) span.innerText = soundsData[i].name[langOrder[langIdx]]; 
    });
    document.getElementById('spFast').innerText = t.speeds.fast;
    document.getElementById('spMed').innerText = t.speeds.medium;
    document.getElementById('spSlow').innerText = t.speeds.slow;
    let sk = (speed === 8) ? 'fast' : (speed === 35) ? 'slow' : 'medium';
    document.getElementById('speedTrigger').innerText = t.speeds[sk];
}

function toggleRandom() {
    if (!timerActive) return;
    unlockAllAudio();
    randomActive = !randomActive; 
    clearTimeout(randomTimer);
    if(randomActive) { runRandom(); } 
    else { audioElements.forEach(el => { if(el.active) fadeOut(el); }); }
    updateUI();
}

function runRandom() {
    if(!randomActive || !timerActive) return;
    let pool = audioElements.filter(el => !el.isMuted);
    if(pool.length > 0) {
        const shuffled = [...pool].sort(() => 0.5 - Math.random());
        const count = Math.floor(Math.random() * 3) + 1;
        const toPlay = shuffled.slice(0, count);
        audioElements.forEach(el => {
            if (toPlay.includes(el)) { if(!el.active) fadeIn(el); } 
            else { if(el.active) fadeOut(el); }
        });
    }
    randomTimer = setTimeout(runRandom, speed * 1000);
}

function toggleSleep() {
    document.getElementById('soundGrid').classList.toggle('hidden');
    document.body.style.background = document.getElementById('soundGrid').classList.contains('hidden') ? "black" : "";
    updateUI();
}

function toggleDropdown() { document.getElementById('speedDropdown').classList.toggle('open'); }
function setSpeed(v, key) { speed = v; toggleDropdown(); updateUI(); if(randomActive) { clearTimeout(randomTimer); runRandom(); } }
function toggleLang() { langIdx = (langIdx + 1) % 4; updateUI(); }

const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = resize; resize();
const starsArr = Array.from({length: 60}, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5, a: Math.random(), s: Math.random() * 0.01 }));
function draw() {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    starsArr.forEach(s => {
      s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
initSounds();
checkAttempts(); 
updateUI();
</script>
