<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="darkreader-lock">
<meta name="color-scheme" content="dark">
<title>BUCKET ASMR | FREE TRIAL</title>
<style>
  /* Стили экрана блокировки триала */
  #trial-expired-screen {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
    z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 20px;
  }
  .expired-box {
    background: rgba(255, 255, 255, 0.05); border: 1px solid #ffb400;
    padding: 40px 30px; border-radius: 30px; backdrop-filter: blur(20px);
    box-shadow: 0 0 30px rgba(255, 180, 0, 0.2); width: 300px;
  }
  .expired-box h2 { color: #ffb400; margin-bottom: 15px; text-transform: uppercase; }
  .buy-btn { 
    background: #ffb400; color: black; border: none; padding: 15px; 
    border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; 
    font-size: 16px; text-decoration: none; display: block; margin-top: 20px;
  }

  /* Основной интерфейс (копируем твои стили) */
  body, html {
    margin: 0; padding: 0; height: 100%;
    background: #050505; transition: background 1s ease;
    font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
    touch-action: manipulation; -webkit-user-select: none; user-select: none;
  }
  body.fancy-bg { background: radial-gradient(ellipse at bottom, #050505 0%, #0a0a1f 100%); }
  .overlay { position: absolute; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.4); z-index:3; pointer-events: none; }
  .container { position: relative; z-index: 10; display:flex; flex-direction: column; align-items:center; padding:20px; height: 100vh; box-sizing: border-box; }
  
  .title-bar { display:flex; align-items:center; gap:15px; margin-bottom:15px; z-index: 1000; }
  h1 { margin:0; font-size:24px; color:#ffb400; text-shadow:0 0 10px #ffb400; }
  
  .live-counter {
    background: rgba(255, 50, 50, 0.15); border: 1px solid rgba(255, 50, 50, 0.4);
    padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; color: #ff8080;
    display: flex; align-items: center; gap: 5px;
  }
  .live-dot { width: 6px; height: 6px; background: #ff3030; border-radius: 50%; animation: blink 1.5s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .controls { margin-bottom:15px; display:flex; gap:10px; justify-content: center; z-index: 10; }
  .controls > button { padding:8px 14px; border:none; border-radius:12px; background: rgba(255,255,255,0.15); color:white; font-weight:bold; backdrop-filter: blur(5px); font-size: 13px; }
  
  .sound-grid { 
    display: grid; grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); 
    gap: 15px; width: 100%; max-width: 600px; flex-grow: 1; z-index: 5;
  }
  .sound-button { 
    aspect-ratio: 1/1; border: 1px solid rgba(255,255,255,0.05); border-radius: 20px; 
    background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); 
    display: flex; flex-direction: column; justify-content: center; align-items: center; 
    backdrop-filter: blur(8px); transition: 0.4s; font-size: 11px; text-align: center; padding: 5px;
  }
  .sound-button.active { color: white; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,180,0,0.1); }
  .lock-icon { font-size: 18px; margin-bottom: 5px; opacity: 0.6; }
  
  canvas { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; }
</style>
</head>
<body class="fancy-bg">

<div id="trial-expired-screen">
  <div class="expired-box">
    <h2>Trial Ended</h2>
    <p>Your 2-minute session is over. Get Premium for unlimited sleep sounds and full library.</p>
    <a href="https://www.patreon.com/posts/join-to-unlock-154613006" class="buy-btn">GET FULL ACCESS</a>
  </div>
</div>

<canvas id="stars"></canvas>
<div class="overlay"></div>

<div class="container">
  <div class="title-bar">
    <h1>BUCKET TRIAL</h1>
    <div class="live-counter">
      <div class="live-dot"></div>
      <span id="online-count">1</span> FREE
    </div>
  </div>

  <div class="controls">
    <button id="trial-timer-display">Time: 02:00</button>
    <button style="background: #ffb400; color: black;" onclick="window.open('https://www.patreon.com/posts/join-to-unlock-154613006')">UPGRADE</button>
  </div>
  
  <div id="soundGrid" class="sound-grid"></div>
</div>

<script>
// --- КОНФИГУРАЦИЯ ТРИАЛА ---
const TRIAL_TIME = 120; // 2 минуты в секундах
const PREMIUM_URL = "https://www.patreon.com/posts/join-to-unlock-154613006";

// Звуки (три бесплатных, остальные закрыты)
const sounds = [
  { "file": "purplebrush.mp3", "name": "Purple Brush", "color": "#9664ff", "locked": false },
  { "file": "pinksoftbrush.mp3", "name": "Soft Brush", "color": "#ffb6c1", "locked": false },
  { "file": "wood.mp3", "name": "Wood Tap", "color": "#ffff00", "locked": false },
  { "file": "strawberry.mp3", "name": "Strawberry", "color": "#ff69b4", "locked": true },
  { "file": "wax.mp3", "name": "Wax", "color": "#ffa500", "locked": true },
  { "file": "choko.mp3", "name": "Choco", "color": "#8b4513", "locked": true }
];

let audioElements = [];
let timeLeft = TRIAL_TIME;
let timerStarted = false;

// ПРОВЕРКА: не закончился ли триал раньше?
if (localStorage.getItem('trial_expired') === 'true') {
    document.getElementById('trial-expired-screen').style.display = 'flex';
}

function startTimer() {
    if (timerStarted) return;
    timerStarted = true;
    
    const countdown = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        
        if (timeLeft <= 0) {
            clearInterval(countdown);
            endTrial();
        }
    }, 1000);
}

function updateTimerDisplay() {
    const mins = Math.floor(timeLeft / 60);
    const secs = timeLeft % 60;
    document.getElementById('trial-timer-display').innerText = `Time: ${mins}:${secs < 10 ? '0' : ''}${secs}`;
}

function endTrial() {
    // Останавливаем все звуки
    audioElements.forEach(el => {
        el.audio.pause();
        el.audio.volume = 0;
    });
    // Сохраняем метку в браузере
    localStorage.setItem('trial_expired', 'true');
    // Показываем экран блокировки
    document.getElementById('trial-expired-screen').style.display = 'flex';
}

// Рендер кнопок
const grid = document.getElementById('soundGrid');
sounds.forEach((s) => {
  const btn = document.createElement('button');
  btn.className = 'sound-button';
  
  if (s.locked) {
      btn.innerHTML = `<div class="lock-icon">🔒</div><span>Premium</span>`;
      btn.onclick = () => { window.open(PREMIUM_URL, '_blank'); };
  } else {
      btn.innerHTML = `<span>${s.name}</span>`;
      
      const audio = new Audio(`https://raw.githubusercontent.com/bucketasmr/sounds/main/${s.file}`);
      audio.loop = true;
      audio.setAttribute('playsinline', '');
      
      const state = { audio, btn, active: false };
      
      btn.onclick = () => {
          startTimer(); // Запуск таймера при первом клике
          if (state.active) {
              state.audio.pause();
              btn.classList.remove('active');
          } else {
              state.audio.play().catch(()=>{});
              btn.classList.add('active');
          }
          state.active = !state.active;
      };
      audioElements.push(state);
  }
  grid.appendChild(btn);
});

// Звезды (твой код)
const canvas = document.getElementById('stars'), ctx = canvas.getContext('2d');
function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
window.onresize = resize; resize();
const starsArr = Array.from({length: 50}, () => ({ x: Math.random() * innerWidth, y: Math.random() * innerHeight, r: Math.random() * 1.5, a: Math.random(), s: Math.random() * 0.01 }));
function draw() {
    ctx.clearRect(0,0,innerWidth,innerHeight);
    starsArr.forEach(s => {
      s.a += s.s; if(s.a > 1 || s.a < 0) s.s *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${Math.abs(s.a)})`; ctx.fill();
    });
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
